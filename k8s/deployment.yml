apiVersion: apps/v1
kind: Deployment
metadata:
  name: hireflow-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hireflow
  template:
    metadata:
      labels:
        app: hireflow
    spec:
      containers:
      - name: hireflow
        image: kess0/hireflow-app:latest # Update with your actual Docker Hub path
        ports:
        - containerPort: 3000
        # Add this to ensure Zero Downtime works during the rollout
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: NODE_ENV
          value: "production"
      restartPolicy: Always
