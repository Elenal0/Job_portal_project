apiVersion: apps/v1
kind: Deployment
metadata:
  name: hireflow-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hireflow
  template:
    metadata:
      labels:
        app: hireflow
    spec:
      containers:
        - name: hireflow
          image: node:18-alpine
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          restartPolicy: Always
