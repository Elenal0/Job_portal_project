name: HireFlow CI/CD Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  build-test-scan-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hireflow:${{ github.sha }} .

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/hireflow:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/hireflow:${{ github.sha }}
