name: HireFlow CI/CD Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: 1-Install and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  docker-scan-push:
    name: 2-Docker Build, Trivy Scan and Push
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hireflow:${{ github.sha }} .

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/hireflow:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hireflow:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USERNAME }}/hireflow:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/hireflow:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/hireflow:latest

  deploy-staging:
    name: 3-Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-scan-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy rolling update
        run: echo "Deployment to staging triggered via rolling update strategy"
